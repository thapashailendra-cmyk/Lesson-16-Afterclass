<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Math Object Methods</title>
</head>
<body>
    <script>
        document.write("Math.abs(-10) : " + Math.abs(-10) + "<br>");
        document.write("Math.acos(.5) : " + Math.acos(.5) + "<br>");
        document.write("Math.asin(9) : " + Math.asin(.0) + "<br>");
        document.write("Math.atan(1) : " + Math.atan(1) + "<br>");
    </script>
</body>
</html>
